<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f2ebe0" />
  <meta name="description" content="Personal offline guide to Elsewhere '26 — what, where, when." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WWW '26" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
  <title>WWW '26 — What Where When</title>
</head>
<body>
  <header class="topbar">
    <div id="filters" class="filters" role="search">
      <input id="search" type="search" placeholder="Search events, camps…" autocomplete="off" />
      <select id="barrio" class="barrio-select" aria-label="Filter by barrio / camp">
        <option value="">🏕 All barrios</option>
      </select>
      <div id="dayPills" class="pills" role="tablist" aria-label="Day"></div>
      <div id="catChips" class="chips" aria-label="Categories"></div>
      <div class="toggles">
        <label class="toggle"><input type="checkbox" id="likedOnly" /> ❤️ Liked only</label>
        <label class="toggle"><input type="checkbox" id="hideAdult" /> 🙈 Hide adult</label>
        <button id="layoutToggle" class="ghost-btn layout-toggle" title="Switch list / timetable" aria-label="Switch between list and timetable" hidden>☰ List</button>
      </div>
    </div>
  </header>

  <p id="filterStatus" class="sr-only" role="status" aria-live="polite"></p>
  <main id="list" class="list" role="tabpanel" aria-label="Events"><p class="loading">Loading events…</p></main>

  <nav class="tabbar" role="tablist" aria-label="Views">
    <button data-view="schedule" class="tab active" role="tab" aria-selected="true" aria-controls="list">🗓<span>Schedule</span></button>
    <button data-view="favs" class="tab" role="tab" aria-selected="false" aria-controls="list">❤️<span>Liked</span></button>
    <button data-view="camps" class="tab" role="tab" aria-selected="false" aria-controls="list">🏕<span>Camps</span></button>
  </nav>

  <div id="modal" class="modal-backdrop" hidden>
    <button id="modalClose" class="modal-close" aria-label="Close">×</button>
    <div id="modalCard" class="modal-card" role="dialog" aria-modal="true" aria-label="Event details"></div>
  </div>

  <script src="ics.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
